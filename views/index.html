<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anonymous Support Feed</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-stack">
        <article class="hero-panel">
          <div class="hero-copy">
            <p class="eyebrow">Anonymous Support Space</p>
            <h1 class="hero-title">Start by logging in or creating your account.</h1>
            <p class="hero-subtitle">
              This application is designed so users enter through authentication first, then access the anonymous support feed to post and reply safely.
            </p>
            <div class="hero-actions">
              <a href="/login" class="button-link">Log in</a>
              <a href="/register" class="button-link secondary-button">Create account</a>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
